<!DOCTYPE html>
<!-- this is the page for a single recipe -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nutriplan - View Recipe</title>
<style>
body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #e8fdfc, #dffcf4, #c8f7dc);
    display: flex;
    flex-direction: column;
    align-items: center;
}

h2 {
    color: #2e7d32;
    margin-top: 20px;
    text-align: center;
}

button {
    margin: 10px;
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background-color: #669a7d;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

#deleteButton {
    background-color: #e53935; /* red for delete */
}

#recipeImage {
    width: 80%;
    max-width: 500px;
    border-radius: 15px;
    margin: 15px 0;
}

ul {
    text-align: left;
    max-width: 500px;
}

#instructions {
    max-width: 500px;
    margin: 15px 0;
}

select {
    margin-top: 10px;
    padding: 8px;
    border-radius: 8px;
}
</style>
</head>
<body>

<h2 id="recipeTitle"></h2>

<div>
    <button id="backButton" onclick="window.history.back()">Back</button>
    <button id="deleteButton">Delete</button>
</div>

<img id="recipeImage" src="" alt="Recipe Image">
<h3>Ingredients</h3>
<ul id="ingredientsList"></ul>

<h3>Instructions</h3>
<div id="instructions"></div>

<h3>Rating</h3>
<select id="starRating">
    <option value="0">0 - No Rating</option>
    <option value="1">1 Star</option>
    <option value="2">2 Stars</option>
    <option value="3">3 Stars</option>
    <option value="4">4 Stars</option>
    <option value="5">5 Stars</option>
</select>

<script>

let currentIndex = null; 

async function loadSavedRecipes() {
    try {
        const res = await fetch("getJSONData.php");
        const data = await res.json();
        return data.record?.recipes || [];
    } catch (err) {
        console.warn("Could not fetch saved recipes.", err);
        return [];
    }
}

async function displaySavedRecipe() {
    const params = new URLSearchParams(window.location.search);
    currentIndex = parseInt(params.get('index'), 10);

    const allRecipes = await loadSavedRecipes();
    if (!allRecipes[currentIndex]) {
        document.getElementById("recipeTitle").textContent = "Recipe not found!";
        document.getElementById("deleteButton").disabled = true;
        return;
    }

    const r = allRecipes[currentIndex];
    document.getElementById("recipeTitle").textContent = r.recipeID;

    const srcMatch = r.recipePhoto.match(/src="(.*?)"/);
    document.getElementById("recipeImage").src = srcMatch ? srcMatch[1] : "";

    const ingredientsList = document.getElementById("ingredientsList");
    ingredientsList.innerHTML = "";
    r.ingredients.split("\n").forEach(i => {
        const li = document.createElement("li");
        li.textContent = i;
        ingredientsList.appendChild(li);
    });

    document.getElementById("instructions").innerHTML = r.instructions;
    document.getElementById("starRating").value = r.star;
}

//Placeholder for delete functionality
document.getElementById("deleteButton").addEventListener("click", () => {
    //const recipeTitle = document.getElementById("recipeTitle").textContent;

   // if (!recipeTitle) return;
//above is the old placeholder code

//First the save recipe function from results.html is repeated in order to get a list of recipes
try {
    await loadSavedRecipes();
    if (!Array.isArray(allRecipes)) allRecipes = [];

    const recipe = {
      recipePhoto: `<img src="${modalImage.src}">`,
      recipeID: modalTitle.textContent,
      ingredients: [...modalIngredients.children].map(li => li.textContent).join("\n"),
      instructions: modalText.innerHTML,
      star: parseInt(starRating.value)
    };

    allRecipes.push(recipe);

     //But before pushing the list of recipes to the database, splice is used to remove the recipe we are trying to delete.  Current Index is used since it is also what was used to get to load this recipe in the first place.
    allRecipes.splice(currentIndex,1);

//Then it's saved just like in the results.html script'
    const payload = { recipes: allRecipes };

    const res = await fetch("putJSONData.php", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const result = await res.json();
    console.log(result); 
	
    if (!res.ok) throw new Error(result.message || "Failed to delete recipe");

    alert("Recipe Deleted!");
    closeModal();
  } catch (err) {
    console.error(err);
    alert("Error deleteing recipe: " + err.message);
  }
//Finally bringing the user back to the page where all of the saved recipes are after they delete the recipe
    window.history.back();

});

displaySavedRecipe();
</script>

</body>
</html>
