<!DOCTYPE html>
<!-- These are the search results of looking for a recipe, listed as a grid -->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nutriplan - Search Results</title>
<style>
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #e8fdfc, #dffcf4, #c8f7dc);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h2 {
    color: #2e7d32;
    margin-top: 30px;
    font-size: 32px;
  }

  #backButton {
    margin: 10px;
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background-color: #669a7d;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  .card-container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: flex-start;
    margin: 20px;
  }

  .card {
    width: 300px;
    padding: 20px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(15px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
    text-align: center;
  }

  .card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 15px;
  }

  .card button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 20px;
    background-color: #669a7d;
    color: white;
    cursor: pointer;
    font-weight: bold;
  }

  /* -------- Modal -------- */
  .modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
  }

  .modal-content {
    background: white;
    width: 500px;
    max-width: 90%;
    margin: 10% auto;
    padding: 20px;
    border-radius: 8px;
    max-height: 70vh;
    overflow-y: auto;
    position: relative;
  }

  .close {
    position: absolute;
    right: 12px;
    top: 8px;
    font-size: 24px;
    cursor: pointer;
  }

  #modalImage {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  select {
    margin-top: 10px;
    padding: 8px;
    border-radius: 8px;
    width: 100%;
  }

  #saveButton {
    margin-top: 15px;
    padding: 10px 20px;
    background-color: #669a7d;
    color: white;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
    width: 100%;
  }
</style>
</head>
<body>

<h2>Search Results</h2>
<button id="backButton" onclick="window.history.back()">Back</button>

<div class="card-container" id="cardContainer"></div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h3 id="modalTitle"></h3>
    <img id="modalImage" src="" alt="Recipe Image">
    <h4>Ingredients</h4>
    <ul id="modalIngredients"></ul>
    <h4>Instructions</h4>
    <div id="modalText"></div>
    <h4>Rating</h4>
    <select id="starRating">
      <option value="0">0 - No Rating</option>
      <option value="1">1 Star</option>
      <option value="2">2 Stars</option>
      <option value="3">3 Stars</option>
      <option value="4">4 Stars</option>
      <option value="5">5 Stars</option>
    </select>
    <button id="saveButton" onclick="saveRecipe()">Save Recipe</button>
  </div>
</div>

<script>
const apiKey = "9d6176d44ca441b59f4e89e2efc59118"; 
const cardContainer = document.getElementById("cardContainer");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const modalImage = document.getElementById("modalImage");
const modalIngredients = document.getElementById("modalIngredients");
const modalText = document.getElementById("modalText");
const starRating = document.getElementById("starRating");

let allRecipes = []; 

function goBack() {
    window.history.back();
}

const params = new URLSearchParams(window.location.search);
const searchTerm = params.get('q');

=
async function fetchRecipes(query) {
    if (!query) return;

    try {
        const res = await fetch(`https://api.spoonacular.com/recipes/complexSearch?apiKey=${apiKey}&query=${encodeURIComponent(query)}&number=8`);
        const data = await res.json();

        cardContainer.innerHTML = "";

        if (!data.results || data.results.length === 0) {
            cardContainer.innerHTML = "<p>No recipes found.</p>";
            return;
        }

        data.results.forEach(recipe => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <img src="${recipe.image}" alt="${recipe.title}">
                <h3>${recipe.title}</h3>
                <button onclick="viewRecipe(${recipe.id})">View Recipe</button>
            `;
            cardContainer.appendChild(card);
        });

    } catch (err) {
        console.error(err);
        cardContainer.innerHTML = "<p>Error loading recipes.</p>";
    }
}

async function openModal(id) {
  const res = await fetch(
    `https://api.spoonacular.com/recipes/${id}/information?apiKey=${apiKey}`
  );
  const recipe = await res.json();

  modalTitle.textContent = recipe.title;
  modalImage.src = recipe.image;

  modalIngredients.innerHTML = "";
  recipe.extendedIngredients.forEach(i => {
      const li = document.createElement("li");
      li.textContent = i.original;
      modalIngredients.appendChild(li);
  });

  modalText.innerHTML = recipe.instructions || "No instructions available.";

  starRating.value = 0;

  modal.style.display = "block";
}

function closeModal() {
  modal.style.display = "none";
}

function viewRecipe(id) {
    openModal(id);
}

/* -------- Save Recipe -------- */
async function saveRecipe() {
  try {
    await loadRecipes();
    if (!Array.isArray(allRecipes)) allRecipes = [];

    const recipe = {
      recipePhoto: `<img src="${modalImage.src}">`,
      recipeID: modalTitle.textContent,
      ingredients: [...modalIngredients.children].map(li => li.textContent).join("\n"),
      instructions: modalText.innerHTML,
      star: parseInt(starRating.value)
    };

    allRecipes.push(recipe);

    const payload = { recipes: allRecipes };

    const res = await fetch("putJSONData.php", {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const result = await res.json();
    console.log(result); 
	
    if (!res.ok) throw new Error(result.message || "Failed to save recipes");

    alert("Recipe Saved!");
    closeModal();
  } catch (err) {
    console.error(err);
    alert("Error saving recipe: " + err.message);
  }
}

/* -------- Load Recipes -------- */
async function loadRecipes() {
  try {
    const res = await fetch("getJSONData.php");
    const data = await res.json();
    allRecipes = data.record?.recipes || []; 
  } catch (err) {
    console.warn("Could not fetch recipes from JSONBin.", err);
    allRecipes = [];
  }
}

fetchRecipes(searchTerm);
</script>
</body>
</html>
