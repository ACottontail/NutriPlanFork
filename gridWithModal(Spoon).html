<!DOCTYPE html>
<!-- This is the main page for Nutriplan -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nutriplan</title>
  <style>
    body {  
    margin: 0;
    font-family: 'Roboto', sans-serif;

    background: linear-gradient(135deg, #e8fdfc, #dffcf4, #c8f7dc);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  
  h2 {
    color: #2e7d32;
    margin-top: 30px;
    font-size: 32px;
  }
  
    /* Top controls */
  input, button {
    margin: 10px;
  }

  #searchBox {
    padding: 12px;
    width: 250px;
    border-radius: 20px;
    border: none;
    outline: none;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  button {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
    background-color: #669a7d;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  
.image-box img {
  width: 100%;
  height: 350px;
  object-fit: cover;
}
  
    /* -------- Grid -------- */
    .card-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: flex-start;
    }

    .card {
    width: 500px;
    padding: 25px;
    border-radius: 20px;
  
    background: rgba(255, 255, 255, 0.55);
    backdrop-filter: blur(15px);
  
    box-shadow: 0 8px 30px rgba(0,0,0,0.1);
  
    text-align: center;
  }

    .card img {
    margin: 20px 0;
    padding: 0;
    border-radius: 15px;
    overflow: hidden; 
  
    background: rgba(255,255,255,0.3);
  }
    .card button {
    padding: 12px 20px;
    border: none;
    border-radius: 25px;
  
    background-color: #669a7d; 
    color: white;
    font-weight: bold;
    cursor: pointer;
  
  
    color: #000000;
  }

    /* -------- Modal -------- */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
    }

    .modal-content {
      background: white;
      width: 500px;
      max-width: 90%;
      margin: 10% auto;
      padding: 20px;
      border-radius: 8px;

      max-height: 70vh;
      overflow-y: auto;
      position: relative;
    }

    .close {
      position: absolute;
      right: 12px;
      top: 8px;
      font-size: 24px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>NutriPlan</h2>

<div class="image-box">
 <img src="welcome.jpg" alt="Welcome image">
 </div>
	  
<input id="searchBox" placeholder="Enter food (ex: chicken)">
<button onclick="searchRecipes()">Search</button>

<button onclick="window.location.href='saved.html'">View Saved Recipes</button>

<!-- Cards -->
<div class="card-container" id="cardContainer"></div>
<div class="card-container" id="savedContainer"></div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">×</span>
    <h3 id="modalTitle"></h3>
    <img id="modalImage" style="width:100%">
    <h4>Ingredients</h4>
    <ul id="modalIngredients"></ul>
    <h4>Instructions</h4>
    <div id="modalText"></div>
    <h4>Rating</h4>
    <select id="starRating">
      <option value="0">0 - No Rating</option>
      <option value="1">1 Star</option>
      <option value="2">2 Stars</option>
      <option value="3">3 Stars</option>
      <option value="4">4 Stars</option>
      <option value="5">5 Stars</option>
    </select>
    <br><br>
    
    <button onclick="saveRecipe()">Save Recipe</button>
	
  </div>
</div>

<script>

const apiKey = "9d6176d44ca441b59f4e89e2efc59118";
const cardContainer = document.getElementById("cardContainer");
const modal = document.getElementById("modal");
const modalTitle = document.getElementById("modalTitle");
const modalText = document.getElementById("modalText");
const modalImage = document.getElementById("modalImage");
const modalIngredients = document.getElementById("modalIngredients");
const starRating = document.getElementById("starRating");

let allRecipes = [];
let activeCard = null;

/* -------- Search Recipes -------- */
function searchRecipes() {
    const query = document.getElementById("searchBox").value.trim();
    if (query === "") {
        alert("Please enter a food to search!");
        return;
    }

    window.location.href = `results.html?q=${encodeURIComponent(query)}`;
}


/* -------- Show Saved Recipes -------- */
async function showSavedRecipes() {
  await loadRecipes();

  const container = document.getElementById("savedContainer");
  container.innerHTML = "";

  if (!allRecipes || allRecipes.length === 0) {
    container.innerHTML = "<p>No saved recipes.</p>";
    return;
  }

  allRecipes.forEach((r, index) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      ${r.recipePhoto}
      <h3>${r.recipeID}</h3>
      <p><strong>Rating:</strong> ${r.star} ⭐</p>
      <button onclick="viewSavedRecipe(${index})">View</button>
    `;

    container.appendChild(card);
  });
}

</script>

</body>
</html>
